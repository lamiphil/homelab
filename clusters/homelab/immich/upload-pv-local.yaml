apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-upload-local
spec:
  storageClassName: immich-local-static
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /srv/media/immich-upload
    type: DirectoryOrCreate
