apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library-nfs
spec:
  storageClassName: nfs-static
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.0.144
    path: /srv/media/photos
  mountOptions:
    - nfsvers=4.2
    - noatime
