apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-direct
  namespace: streaming
spec:
  type: ClusterIP
  selector:
    app: qbittorrent-direct
  ports:
    - name: webui
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: bittorrent-tcp
      protocol: TCP
      port: 6881
      targetPort: 6881
    - name: bittorrent-udp
      protocol: UDP
      port: 6881
      targetPort: 6881
