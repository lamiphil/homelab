apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-nfs-vlan
spec:
  storageClassName: nfs-static
  capacity:
    storage: 2Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.42.11
    path: /srv/media
  mountOptions:
    - nfsvers=4.2
    - noatime
