apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "79.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  valuesFrom:
    - kind: Secret 
      name: grafana-admin
      valuesKey: adminPassword
      targetPath: grafana.adminPassword

  values:
    grafana:
      service:
        type: LoadBalancer
        loadBalancerIP: 192.168.2.30
      nodeSelector:
        kubernetes.io/hostname: ubuntuserver
      defaultDashboardsTimezone: "America/Montreal"
      adminUser: "lamiphil"

      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: false

    prometheus:
      service:
        type: LoadBalancer
        loadBalancerIP: 192.168.2.31

    alertmanager:
      service:
        type: LoadBalancer
        loadBalancerIP: 192.168.2.32

    nodeExporter:
      nodeSelector: {}
